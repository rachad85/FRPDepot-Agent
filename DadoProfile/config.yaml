model:
  default: gpt-5.6-sol
  provider: openai-codex
  base_url: ''
  api_mode: chat_completions
agent:
  max_turns: 60
  service_tier: normal
  verbose: false
  reasoning_effort: xhigh
terminal:
  backend: local
  cwd: C:\FRPDepot
  timeout: 600
  home_mode: auto
web:
  backend: firecrawl
tool_loop_guardrails:
  warnings_enabled: true
  hard_stop_enabled: true
  warn_after:
    exact_failure: 2
    same_tool_failure: 3
    idempotent_no_progress: 2
  hard_stop_after:
    exact_failure: 4
    same_tool_failure: 6
    idempotent_no_progress: 4
compression:
  enabled: true
  threshold: 0.5
  target_ratio: 0.2
  protect_last_n: 20
  protect_first_n: 3
prompt_caching:
  cache_ttl: 5m
auxiliary:
  vision:
    provider: nous
    model: anthropic/claude-fable-5
  web_extract:
    provider: nous
    model: anthropic/claude-fable-5
  compression:
    provider: nous
    model: anthropic/claude-fable-5
  skills_hub:
    provider: nous
    model: anthropic/claude-fable-5
  approval:
    provider: nous
    model: anthropic/claude-fable-5
  mcp:
    provider: nous
    model: anthropic/claude-fable-5
  title_generation:
    provider: nous
    model: anthropic/claude-fable-5
  curator:
    provider: nous
    model: anthropic/claude-fable-5
display:
  compact: false
  busy_input_mode: queue
  bell_on_complete: false
  show_reasoning: false
  streaming: true
  skin: default
  interim_assistant_messages: true
  platforms:
    telegram:
      tool_progress: 'off'
      busy_ack_detail: false
      long_running_notifications: generic
      interim_assistant_messages: false
      cleanup_progress: true
  tool_progress: all
  cleanup_progress: false
  long_running_notifications: true
  busy_ack_detail: true
  background_process_notifications: false
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 0
  flush_min_turns: 6
delegation:
  max_iterations: 50
skills:
  creation_nudge_interval: 0
command_allowlist:
  - recursive delete
  - execute_code
  - stop/restart hermes gateway (kills running agents)
  - hermes update (restarts gateway, kills running agents)
  - script execution via -e/-c flag
code_execution:
  timeout: 300
  max_tool_calls: 50
streaming:
  enabled: false
session_reset:
  mode: none
  idle_minutes: 1440
  at_hour: 4
group_sessions_per_user: true
platforms:
  api_server:
    enabled: true
_config_version: 33
